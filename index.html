<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>cs thingy</title>
  <style>
    :root {
      --ink: #fffaf2;
      --muted: rgba(255, 250, 242, 0.74);
      --panel: rgba(15, 18, 25, 0.82);
      --panel-strong: rgba(15, 18, 25, 0.95);
      --line: rgba(255, 255, 255, 0.2);
      --gold: #ffd36e;
      --rose: #ff8faa;
      --mint: #83ddc2;
      --blue: #9fd2ff;
      --bad: #ff9a8a;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0b0e14;
      color: var(--ink);
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      min-height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      padding: 0 14px;
      color: #18120a;
      background: var(--gold);
      font-weight: 850;
      cursor: pointer;
    }

    button.secondary {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.1);
    }

    button.ghost {
      color: var(--muted);
      background: transparent;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.34);
      color: var(--ink);
      outline: none;
    }

    input {
      height: 46px;
      padding: 0 12px;
    }

    textarea {
      min-height: 180px;
      padding: 12px;
      resize: vertical;
      line-height: 1.5;
    }

    .app {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 390px;
      background:
        radial-gradient(circle at 12% 10%, rgba(255, 211, 110, 0.18), transparent 30%),
        radial-gradient(circle at 85% 16%, rgba(131, 221, 194, 0.14), transparent 34%),
        #0b0e14;
    }

    .wall {
      position: relative;
      overflow: hidden;
      min-width: 0;
      padding: clamp(16px, 3vw, 30px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
    }

    .wall::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: var(--bg);
      background-size: cover;
      background-position: center;
      filter: blur(18px) brightness(0.62) saturate(1.08);
      transform: scale(1.08);
      opacity: 0.72;
    }

    .wall::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(5, 7, 12, 0.28), transparent 46%, rgba(5, 7, 12, 0.44)),
        radial-gradient(circle at center, transparent 35%, rgba(0, 0, 0, 0.48));
      pointer-events: none;
    }

    .topbar,
    .photo-grid,
    .minigame {
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 11px;
      background: rgba(15, 18, 25, 0.72);
      backdrop-filter: blur(12px);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.26);
    }

    .progress {
      display: flex;
      gap: 7px;
      align-items: center;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.22);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.16);
    }

    .dot.active {
      background: var(--gold);
      box-shadow: 0 0 18px rgba(255, 211, 110, 0.8);
    }

    .photo-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 14px;
      min-height: 0;
      align-items: stretch;
    }

    .photo-card,
    .memory-card {
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .photo-card {
      position: relative;
      min-height: 390px;
    }

    .photo-card img {
      width: 100%;
      height: 100%;
      min-height: 390px;
      object-fit: cover;
      display: block;
    }

    .caption {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      padding: 12px 14px;
      background: rgba(8, 10, 15, 0.72);
      color: var(--muted);
      backdrop-filter: blur(12px);
      line-height: 1.42;
    }

    .memory-stack {
      display: grid;
      gap: 12px;
      min-height: 0;
    }

    .memory-card {
      padding: 14px;
      color: var(--muted);
      line-height: 1.42;
    }

    .memory-card strong {
      display: block;
      margin-bottom: 5px;
      color: var(--ink);
    }

    .memory-card.clickable {
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .memory-card.clickable:hover,
    .memory-card.selected {
      transform: translateY(-2px);
      border-color: rgba(255, 211, 110, 0.72);
      background: rgba(255, 211, 110, 0.12);
    }

    .minigame {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: rgba(15, 18, 25, 0.74);
      backdrop-filter: blur(12px);
    }

    .minigame-title {
      margin: 0 0 8px;
      color: var(--mint);
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .choice-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .side {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      gap: 14px;
      padding: 18px;
      border-left: 1px solid var(--line);
      background: rgba(9, 12, 18, 0.92);
      overflow: hidden;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--mint);
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1,
    h2 {
      margin: 0;
      line-height: 1;
      letter-spacing: 0;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 4rem);
    }

    h2 {
      font-size: clamp(1.8rem, 5vw, 3.2rem);
    }

    p {
      color: var(--muted);
      line-height: 1.5;
    }

    .letter-panel {
      min-height: 0;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.06);
      white-space: pre-wrap;
      line-height: 1.55;
      color: rgba(255, 250, 242, 0.86);
    }

    .lock {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.06);
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .feedback {
      min-height: 22px;
      margin-top: 10px;
      color: var(--bad);
      font-weight: 750;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(3, 5, 10, 0.62);
      backdrop-filter: blur(12px);
    }

    .modal.hidden,
    .hidden {
      display: none;
    }

    .panel {
      width: min(720px, 100%);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      padding: clamp(22px, 5vw, 42px);
      background: var(--panel-strong);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.48);
    }

    .panel h1 {
      font-size: clamp(3rem, 13vw, 7rem);
    }

    .editable-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) 360px;
      }

      .side {
        border-left: 0;
        border-top: 1px solid var(--line);
      }

      .photo-grid {
        grid-template-columns: 1fr;
        overflow: auto;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="wall" id="wall">
      <div class="topbar">
        <div class="pill">cs thingy</div>
        <div class="pill progress" id="progress"></div>
      </div>

      <section class="photo-grid">
        <article class="photo-card">
          <img id="sceneImage" alt="">
          <div class="caption" id="caption"></div>
        </article>
        <div class="memory-stack" id="memoryStack"></div>
      </section>

      <section class="minigame" id="minigame"></section>
    </section>

    <aside class="side">
      <section>
        <p class="eyebrow" id="segmentLabel">Segment</p>
        <h1 id="segmentTitle">今晚</h1>
        <p id="segmentIntro"></p>
      </section>

      <section class="letter-panel" id="letterPanel"></section>

      <section class="lock" id="lockPanel">
        <p class="eyebrow">Passcode</p>
        <input id="passInput" autocomplete="off" placeholder="Enter the password you received">
        <div class="row">
          <button id="unlockButton">Unlock Next</button>
          <button class="secondary" id="hintButton">Hint</button>
        </div>
        <div class="feedback" id="feedback"></div>
      </section>
    </aside>
  </main>

  <section class="modal" id="startModal">
    <div class="panel">
      <p class="eyebrow">one year anniversary</p>
      <h1>cs thingy</h1>
      <p>Hi poopoo, I bet this is a surprise 嘿嘿. 这里有一些充满着我们回忆的小游戏，祝你玩得开心~</p>
      <div class="row">
        <button id="startButton">Start</button>
      </div>
    </div>
  </section>

  <script>
    const STORAGE = "cs-thingy-anniversary-notes-v1";
    const segmentOrder = ["tonight", "finch", "bbq", "wayback"];
    const branchOrder = { love: "waybackLove", loved: "waybackLoved" };
    const state = {
      current: "tonight",
      unlocked: new Set(["tonight"]),
      selectedMini: [],
      branch: null
    };

    const segments = {
      tonight: {
        index: 1,
        title: "今晚",
        label: "Segment 1 - Welcome letter",
        image: "assets/scenes/rooftop.png",
        caption: "Exactly 365 days ago, in the beautiful night, at 1 am, something finally became honest.",
        intro: "No game here. Just a letter before tomorrow starts.",
        pass: "060625",
        hint: "今晚的日期密码.",
        next: "finch",
        cards: [
          ["365 days", "Exactly 365 days ago, in the beautiful night, at 1 am, 我们把话说开了，也决定了我们要在一起."],
          ["The second day", "我们呢也在第二天的白天，经过我的表白（抱歉当时真的太太太紧张了 有点不会说话了哈哈哈）."]
        ],
        letter: "Hi poopoo, I bet this is a surprise 嘿嘿,\n\n这里有一些充满着我们回忆的小游戏，祝你玩得开心~\n\nExactly 365 days ago, in the beautiful night, at 1 am, 我们把话说开了，也决定了我们要在一起。\n\n我们呢也在第二天的白天，经过我的表白（抱歉当时真的太太太紧张了 有点不会说话了哈哈哈）正式开始了这一段我最珍惜的关系。"
      },
      finch: {
        index: 2,
        title: "Finch",
        label: "Segment 2 - Snow turning point",
        image: "assets/scenes/school.png",
        caption: "Back here again: snow, a long conversation, and the first hug.",
        intro: "A tiny text puzzle about the BIG SCARY SAD CRYING TURNING POINT.",
        pass: "0203",
        hint: "The password is the date/code you will give her at Finch.",
        next: "bbq",
        mini: "finch",
        cards: [
          ["Anddd we are back here baby", "Remember in the snow, this was the first time we had a long conversation in person, AND A HUG."],
          ["Turning point", "This, in our relation-pre-ship, was known as the BIG SCARY SAD CRYING TURNING POINT. 嗯也是回暖的关键转折点。"],
          ["Pocket thought", "我猜你一定不知道我们在雪中走的时候我有多想上去牵住你的手，放进我的口袋里。"],
          ["Tiny mystery", "I don’t remember, did we even order anything?"]
        ],
        letter: "Anddd we are back here baby.\n\nRemember in the snow, this was the first time we had a long conversation in person, AND A HUG.\n\nThis, in our relation-pre-ship, was known as the BIG SCARY SAD CRYING TURNING POINT. 嗯也是回暖的关键转折点。\n\n我猜你一定不知道我们在雪中走的时候我有多想上去牵住你的手，放进我的口袋里。\n\nI don’t remember, did we even order anything?"
      },
      bbq: {
        index: 3,
        title: "BBQ",
        label: "Segment 3 - Concert night",
        image: "assets/scenes/mcdonalds.png",
        caption: "Concert, sleepiness, barbecue, the stage girl, and the unmatched 酸奶皮子.",
        intro: "Build the BBQ memory plate, then use the passcode from tomorrow.",
        pass: "陶吉吉",
        hint: "The password is the Chinese name you will give her for BBQ.",
        next: "wayback",
        mini: "bbq",
        cards: [
          ["First concert", "我们第一场一起看的演唱会."],
          ["Sleepy BBQ", "你扛着困意陪我来吃烧烤，还遇见了上台的那个小姐姐."],
          ["酸奶皮子", "最最好吃的酸奶皮子。在那以后没有遇见any 酸奶 that’s remotely comparable."],
          ["Maybe", "Maybe, it’s the experience with you that made it so tasteful~."]
        ],
        letter: "我们第一场一起看的演唱会。\n\n你扛着困意陪我来吃烧烤，还遇见了上台的那个小姐姐 and 最最好吃的酸奶皮子。\n\n在那以后没有遇见 any 酸奶 that’s remotely comparable.\n\nMaybe, it’s the experience with you that made it so tasteful~."
      },
      wayback: {
        index: 4,
        title: "Way back / going home",
        label: "Segment 4 - Choose the way home",
        image: "assets/scenes/cafe.png",
        caption: "Two passwords, two versions of the way back.",
        intro: "This segment branches depending on the password you give her in person.",
        pass: ["I love you", "I loved you"],
        hint: "Version 1 password: I love you. Version 2 password: I loved you.",
        mini: "branch",
        cards: [
          ["Version 1", "Password: I love you. Opens 99个喜欢你的原因."],
          ["Version 2", "Password: I loved you. Opens an empty letter placeholder for later."]
        ],
        letter: "Way back will have two different pathways, depending on the password provided.\n\nVersion 1: I love you\nVersion 2: I loved you"
      },
      waybackLove: {
        index: 5,
        title: "Way back - Version 1",
        label: "Segment 5 - 99 reasons",
        image: "assets/scenes/house.png",
        caption: "99个喜欢你的原因. This one is intentionally unfinished so you can add more.",
        intro: "A soft little reason wall. Add the rest later.",
        final: true,
        editable: "reasons",
        cards: [
          ["Reason 1", "三观！！！理念，真的很好。喜欢为了心中所想的正义与美好，不求回报所付出的你。"],
          ["Reason 2", "今天第一次跟我闹小脾气了哈哈哈哈 也太可爱了吧"],
          ["Reason 3", "永远为他人着想"],
          ["Reason 4", "你就是傲娇 I know you love me :>"]
        ],
        letter: "99个喜欢你的原因：\n\n1. 三观！！！理念，真的很好。喜欢为了心中所想的正义与美好，不求回报所付出的你。\n2. 今天第一次跟我闹小脾气了哈哈哈哈 也太可爱了吧\n3. 永远为他人着想\n4. 你就是傲娇 I know you love me :>\n5. ...\n\nDO NOT IMPLEMENT - I WILL ADD LATER"
      },
      waybackLoved: {
        index: 6,
        title: "Way back - Version 2",
        label: "Segment 6 - Letter placeholder",
        image: "assets/scenes/rooftop.png",
        caption: "A second version for the way home. Empty for now.",
        intro: "This path is intentionally blank so you can write the letter later.",
        final: true,
        editable: "letter",
        cards: [
          ["Letter draft", "Leave empty for now. You can write this later."]
        ],
        letter: ""
      }
    };

    const savedNotes = loadSavedNotes();
    const wall = document.querySelector("#wall");
    const sceneImage = document.querySelector("#sceneImage");
    const caption = document.querySelector("#caption");
    const progress = document.querySelector("#progress");
    const memoryStack = document.querySelector("#memoryStack");
    const minigame = document.querySelector("#minigame");
    const segmentLabel = document.querySelector("#segmentLabel");
    const segmentTitle = document.querySelector("#segmentTitle");
    const segmentIntro = document.querySelector("#segmentIntro");
    const letterPanel = document.querySelector("#letterPanel");
    const lockPanel = document.querySelector("#lockPanel");
    const passInput = document.querySelector("#passInput");
    const feedback = document.querySelector("#feedback");
    const startModal = document.querySelector("#startModal");

    document.querySelector("#startButton").addEventListener("click", () => startModal.classList.add("hidden"));
    document.querySelector("#unlockButton").addEventListener("click", unlock);
    document.querySelector("#hintButton").addEventListener("click", () => feedback.textContent = currentSegment().hint || "No hint for this one.");
    passInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") unlock();
    });

    function render() {
      const segment = currentSegment();
      wall.style.setProperty("--bg", `url("${segment.image}")`);
      sceneImage.src = segment.image;
      sceneImage.alt = segment.title;
      caption.textContent = segment.caption;
      segmentLabel.textContent = segment.label;
      segmentTitle.textContent = segment.title;
      segmentIntro.textContent = segment.intro;
      feedback.textContent = "";
      passInput.value = "";

      progress.innerHTML = Array.from({ length: 6 }, (_, i) => `<span class="dot ${i + 1 <= segment.index ? "active" : ""}"></span>`).join("");
      memoryStack.innerHTML = segment.cards.map(([title, body], index) => `
        <article class="memory-card ${segment.mini ? "clickable" : ""}" data-card="${index}">
          <strong>${escapeHtml(title)}</strong>
          ${escapeHtml(body)}
        </article>
      `).join("");

      renderLetter(segment);
      renderMini(segment);

      lockPanel.classList.toggle("hidden", Boolean(segment.final));
      if (segment.final) passInput.value = "";
    }

    function renderLetter(segment) {
      const saved = savedNotes[segment.editable];
      const text = saved ?? segment.letter;
      if (!segment.editable) {
        letterPanel.textContent = text;
        return;
      }

      letterPanel.innerHTML = `
        <textarea id="editableText">${escapeHtml(text)}</textarea>
        <div class="row">
          <button id="saveEditable">Save This Text</button>
          <button class="secondary" id="resetEditable">Reset</button>
        </div>
        <div class="editable-note">Saved only in this browser for now, so you can fill it in later.</div>
      `;
      document.querySelector("#saveEditable").addEventListener("click", () => {
        savedNotes[segment.editable] = document.querySelector("#editableText").value;
        saveNotes();
      });
      document.querySelector("#resetEditable").addEventListener("click", () => {
        delete savedNotes[segment.editable];
        saveNotes();
        render();
      });
    }

    function renderMini(segment) {
      state.selectedMini = [];
      if (!segment.mini) {
        minigame.innerHTML = `<p class="minigame-title">Memory mode</p><div class="choice-row"><span class="pill">Read the letter, then use tomorrow's password.</span></div>`;
        return;
      }

      if (segment.mini === "finch") {
        minigame.innerHTML = `
          <p class="minigame-title">Mini game - snow walk order</p>
          <div class="choice-row">
            ${["long conversation", "hug", "turning point", "pocket hand"].map(item => `<button class="secondary mini-choice" data-value="${item}">${item}</button>`).join("")}
          </div>
          <div class="feedback" id="miniFeedback">Pick the memory beats in any order to warm up the scene.</div>
        `;
        bindMiniChoices(4, "The snow feels warmer now.");
      }

      if (segment.mini === "bbq") {
        minigame.innerHTML = `
          <p class="minigame-title">Mini game - BBQ plate</p>
          <div class="choice-row">
            ${["concert", "sleepy bbq", "stage girl", "酸奶皮子"].map(item => `<button class="secondary mini-choice" data-value="${item}">${item}</button>`).join("")}
          </div>
          <div class="feedback" id="miniFeedback">Collect the pieces of the night.</div>
        `;
        bindMiniChoices(4, "Plate complete. Somehow the 酸奶 still wins.");
      }

      if (segment.mini === "branch") {
        minigame.innerHTML = `
          <p class="minigame-title">Branching path</p>
          <div class="choice-row">
            <span class="pill">I love you -> Version 1</span>
            <span class="pill">I loved you -> Version 2</span>
          </div>
        `;
      }
    }

    function bindMiniChoices(target, doneText) {
      document.querySelectorAll(".mini-choice").forEach(button => {
        button.addEventListener("click", () => {
          button.classList.add("selected");
          if (!state.selectedMini.includes(button.dataset.value)) state.selectedMini.push(button.dataset.value);
          document.querySelector("#miniFeedback").textContent = state.selectedMini.length >= target ? doneText : `${state.selectedMini.length}/${target} memories collected.`;
        });
      });
    }

    function unlock() {
      const segment = currentSegment();
      const typed = normalize(passInput.value);
      if (Array.isArray(segment.pass)) {
        if (typed === normalize("I love you")) {
          state.branch = "love";
          state.current = branchOrder.love;
          render();
          return;
        }
        if (typed === normalize("I loved you")) {
          state.branch = "loved";
          state.current = branchOrder.loved;
          render();
          return;
        }
      } else if (typed === normalize(segment.pass)) {
        state.current = segment.next;
        render();
        return;
      }
      feedback.textContent = "Not this password. Wait for the password from tomorrow's event.";
    }

    function currentSegment() {
      return segments[state.current];
    }

    function normalize(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/[，。！？、；：,.!?;:'"“”‘’（）()\-_\s]+/g, "");
    }

    function loadSavedNotes() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE)) || {};
      } catch {
        return {};
      }
    }

    function saveNotes() {
      localStorage.setItem(STORAGE, JSON.stringify(savedNotes));
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    render();
  </script>
</body>
</html>
